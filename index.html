  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #ffffff;
      color: #1A2C3E;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    :root {
      --primary: #0A4B6E;
      --primary-dark: #063449;
      --accent: #2A9D8F;
      --accent-light: #E9F5F2;
      --warm: #E76F51;
      --gray-50: #F8FAFE;
      --gray-100: #F1F4F9;
      --gray-200: #E4E9F0;
      --gray-600: #5A6E7A;
      --gray-800: #2C3E47;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 20px 32px -12px rgba(0, 0, 0, 0.15);
      --border-radius-card: 24px;
      --border-radius-element: 60px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ===== HEADER ===== */
    header {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: all 0.2s ease;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 78px;
    }

    .logo-horizontal {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(42, 157, 143, 0.3);
      position: relative;
    }

    .logo-icon::after {
      content: "✈";
      font-size: 20px;
      color: white;
      font-weight: 500;
    }

    .logo-text-main {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.3px;
      background: linear-gradient(110deg, var(--primary), var(--accent));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .logo-text-sub {
      font-size: 0.7rem;
      color: var(--gray-600);
      letter-spacing: 0.2px;
    }

    nav ul {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    nav a {
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--gray-800);
      transition: all 0.2s;
      position: relative;
    }

    nav a:hover {
      color: var(--primary);
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2.5px;
      bottom: -6px;
      left: 0;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 2px;
      transition: width 0.25s ease;
    }

    nav a:hover::after {
      width: 100%;
    }

    .hamburger {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--primary);
    }

    /* ===== HERO SECTION ===== */
    .hero {
      padding: 56px 0 48px;
      background: radial-gradient(circle at 80% 20%, rgba(42,157,143,0.05), white 70%);
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 0.9fr;
      gap: 48px;
      align-items: center;
    }

    .hero-title {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(125deg, #0A4B6E, #2A9D8F);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }

    .hero-subtitle {
      font-size: 1.2rem;
      color: var(--gray-600);
      margin-bottom: 16px;
      font-weight: 400;
      max-width: 90%;
    }

    .hero-role {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      background: var(--accent-light);
      display: inline-block;
      padding: 6px 14px;
      border-radius: 40px;
      margin-bottom: 28px;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.25s ease;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 10px rgba(10,75,110,0.25);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-3px);
      box-shadow: 0 12px 20px -8px rgba(10,75,110,0.4);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
    }

    .btn-secondary:hover {
      background: var(--accent);
      color: white;
      transform: translateY(-2px);
    }

    .hero-photo {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background-size: cover;
      background-position: 50% 20%;
      box-shadow: 0 28px 38px -16px rgba(0,0,0,0.25), 0 0 0 6px white, 0 0 0 12px rgba(42,157,143,0.2);
      transition: transform 0.4s ease;
    }
    .hero-photo:hover {
      transform: scale(1.02);
    }

    /* section common */
    section {
      padding: 70px 0;
    }
    section:nth-of-type(even) {
      background-color: var(--gray-50);
    }

    .section-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
      color: var(--primary-dark);
    }
    .section-subtitle {
      font-size: 1rem;
      color: var(--gray-600);
      margin-bottom: 40px;
      max-width: 700px;
    }

    /* two-column grid */
    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    /* expertise tags */
    .expertise-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }
    .expertise-item {
      background: white;
      border: 1px solid var(--gray-200);
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--primary);
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }
    .expertise-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    .card {
      background: white;
      border-radius: var(--border-radius-card);
      padding: 24px;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(42,157,143,0.3);
    }

    .card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .card p {
      font-size: 0.9rem;
      color: var(--gray-600);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .card a {
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--accent);
      text-decoration: none;
    }
    .card a:hover {
      gap: 8px;
      color: var(--primary);
    }

    /* Video thumb grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
      margin-top: 12px;
    }
